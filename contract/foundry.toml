[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
hashkeyTestnet = "https://testnet.hsk.xyz"
hashkeyMainnet = "https://mainnet.hsk.xyz"

[etherscan]
hashkeyTestnet = { key = "${ETHERSCAN_API_KEY}", url = "https://testnet-explorer.hsk.xyz/api/" }
hashkeyMainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://hashkey.blockscout.com/api/" }
